<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartCSP</title>

    <style>
        body {
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            background: #fafaf7;
            color: #2e2e2e;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 120px auto;
            padding: 40px;
        }

        h1 {
            color: #3f4f3c;
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #555;
            max-width: 600px;
        }

        .card {
            margin-top: 40px;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        button {
            background: #ABBB9C;
            color: #fff;
            border: none;
            padding: 12px 22px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .status {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
            display: none;
        }
    </style>

    <script>
        function showStatus() {
            const statusBox = document.getElementById("status");
            statusBox.style.display = "block";

            const steps = [
                "Initializing scan...",
                "Discovering website resources...",
                "Generating Content Security Policy...",
                "Testing CSP in sandbox environment...",
                "Calculating security metrics...",
                "Generating report..."
            ];

            let index = 0;
            statusBox.innerText = steps[index];

            setInterval(() => {
                if (index < steps.length - 1) {
                    index++;
                    statusBox.innerText = steps[index];
                }
            }, 1800);
        }
    </script>
</head>

<body>

<div class="container">
    <h1>SmartCSP</h1>
    <p>
        SmartCSP analyzes a websites runtime behavior to generate, test, and
        evaluate a secure Content Security Policy tailored to real resource usage.
    </p>

    <div class="card">
        <form method="POST" onsubmit="showStatus()">
            <label for="website_url">Website URL</label>
            <input
                type="text"
                id="website_url"
                name="website_url"
                placeholder="https://example.com"
                required
            >
            <button type="submit">Generate CSP</button>
        </form>

        <div id="status" class="status"></div>
    </div>
</div>

</body>
</html>
